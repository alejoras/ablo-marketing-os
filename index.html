<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Ablo Studio · Marketing OS</title>
  <link rel="icon" href="assets/ablo-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0c0c0c; --bg2:#151515; --bg3:#1a1a1a; --elevated:#222222;
      --border:#2a2a2a; --border-h:#3a3a3a;
      --text:#fafafa; --text2:#999999; --muted:#555555;
      --accent:#e8d5a3; --accent-h:#f0e0b5; --accent-dim:#c9a96e;
      --success:#4ade80; --error:#f87171;
      --glass:rgba(255,255,255,0.03);
      --glass-h:rgba(255,255,255,0.05);
      --line:rgba(255,255,255,0.08);
      --line-soft:rgba(255,255,255,0.06);
      --line-h:rgba(255,255,255,0.12);
      --radius:16px; --radius-lg:12px; --radius-sm:8px; --full:9999px;
      --ease:cubic-bezier(0.22,1,0.36,1);
      --sans:'Inter',system-ui,-apple-system,sans-serif;
      --sidebar:264px; --maxw:1080px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body {
      font-family:var(--sans); background:var(--bg); color:var(--text);
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
      font-size:14px; line-height:1.625; min-height:100vh;
    }
    /* single dim accent glow, per the Ablo design spec */
    body::before {
      content:''; position:fixed; top:-260px; right:-220px; width:640px; height:640px;
      background:radial-gradient(circle, rgba(232,213,163,0.06), transparent 62%);
      pointer-events:none; z-index:0;
    }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--border-h); }
    a { color:inherit; text-decoration:none; }

    /* ---------- Sidebar ---------- */
    #sidebar {
      position:fixed; inset:0 auto 0 0; width:var(--sidebar);
      background:rgba(18,18,18,0.72); backdrop-filter:blur(24px);
      border-right:1px solid var(--line); display:flex; flex-direction:column;
      z-index:50; transition:transform .3s var(--ease);
    }
    .brand { padding:26px 24px 22px; border-bottom:1px solid var(--line-soft); display:flex; align-items:center; gap:12px; }
    .brand img { width:26px; height:26px; object-fit:contain; opacity:.95; }
    .brand .wm { display:flex; flex-direction:column; line-height:1.15; }
    .brand .wm b { font-weight:600; font-size:15px; letter-spacing:.04em; }
    .brand .wm span { font-size:9.5px; letter-spacing:.22em; color:var(--accent-dim); text-transform:uppercase; margin-top:3px; }
    nav { flex:1; overflow-y:auto; padding:18px 14px 10px; }
    .nav-group { margin-bottom:20px; }
    .nav-group h4 { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); padding:0 12px 8px; font-weight:500; }
    .nav-item {
      display:flex; align-items:center; gap:11px; padding:9px 12px; border-radius:var(--radius-sm);
      color:var(--text2); cursor:pointer; font-size:13px; font-weight:500; position:relative;
      transition:background .2s var(--ease), color .2s var(--ease); user-select:none;
    }
    .nav-item svg { width:16px; height:16px; flex-shrink:0; stroke-width:1.6; opacity:.85; }
    .nav-item:hover { background:var(--glass-h); color:var(--text); }
    .nav-item.active { background:rgba(232,213,163,0.10); color:var(--accent); }
    .nav-item.active::before {
      content:''; position:absolute; left:-14px; top:50%; transform:translateY(-50%);
      width:3px; height:18px; background:var(--accent); border-radius:0 3px 3px 0;
    }
    .side-foot { padding:16px 22px 20px; border-top:1px solid var(--line-soft); font-size:11px; color:var(--muted); }
    .side-foot .row { display:flex; align-items:center; gap:7px; margin-bottom:7px; }
    .dot { width:6px; height:6px; border-radius:var(--full); flex-shrink:0; }
    .dot.live { background:var(--success); box-shadow:0 0 0 3px rgba(74,222,128,0.14); }
    .dot.cached { background:var(--accent-dim); box-shadow:0 0 0 3px rgba(201,169,110,0.12); }
    .side-foot .stamp { color:var(--text2); margin-top:10px; padding-top:10px; border-top:1px solid var(--line-soft); }

    /* ---------- Main ---------- */
    #main { margin-left:var(--sidebar); position:relative; z-index:1; min-height:100vh; }
    .topbar {
      position:sticky; top:0; z-index:40; display:flex; align-items:center; justify-content:space-between;
      padding:14px 40px; background:rgba(12,12,12,0.72); backdrop-filter:blur(24px);
      border-bottom:1px solid var(--line-soft);
    }
    .topbar .crumb { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
    .conf { display:inline-flex; align-items:center; gap:7px; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent-dim); border:1px solid rgba(201,169,110,0.28); padding:5px 12px; border-radius:var(--full); }
    .hamb { display:none; background:none; border:1px solid var(--line); color:var(--text); width:38px; height:38px; border-radius:var(--radius-sm); cursor:pointer; align-items:center; justify-content:center; }
    .hamb svg { width:18px; height:18px; }

    .view { max-width:var(--maxw); margin:0 auto; padding:44px 40px 100px; }

    /* ---------- Section header ---------- */
    .eyebrow { font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--accent-dim); font-weight:500; margin-bottom:14px; }
    .view h1 { font-size:34px; font-weight:600; letter-spacing:-.025em; line-height:1.12; margin-bottom:12px; }
    .lede { font-size:16px; color:var(--text2); max-width:62ch; line-height:1.55; }
    .sec-head { margin-bottom:34px; }

    /* ---------- Reveal animation ---------- */
    .reveal { opacity:0; transform:translateY(14px); animation:rise .7s var(--ease) forwards; }
    @keyframes rise { to { opacity:1; transform:none; } }

    /* ---------- Layout primitives ---------- */
    .stack > * + * { margin-top:18px; }
    .grid { display:grid; gap:16px; }
    .g2 { grid-template-columns:repeat(2,1fr); }
    .g3 { grid-template-columns:repeat(3,1fr); }
    .g4 { grid-template-columns:repeat(4,1fr); }
    .blocktitle { font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); font-weight:500; margin:40px 0 16px; }
    .blocktitle:first-child { margin-top:0; }

    /* ---------- Card ---------- */
    .card {
      background:var(--glass); border:1px solid var(--line); border-radius:var(--radius);
      padding:22px 24px; transition:border-color .2s var(--ease), background .2s var(--ease);
    }
    .card:hover { border-color:var(--line-h); background:var(--glass-h); }
    .card.flat:hover { border-color:var(--line); background:var(--glass); }
    .card h3 { font-size:15px; font-weight:600; margin-bottom:8px; letter-spacing:-.01em; }
    .card p { color:var(--text2); font-size:13.5px; }
    .card.accent { border-color:rgba(232,213,163,0.26); background:rgba(232,213,163,0.045); }
    .card.lead { border-left:2px solid var(--accent); }
    .card .ico { width:36px; height:36px; border-radius:var(--radius-sm); background:rgba(232,213,163,0.12); display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
    .card .ico svg { width:18px; height:18px; stroke:var(--accent); stroke-width:1.6; }
    .num-badge { font-size:12px; font-weight:600; color:var(--accent); border:1px solid rgba(232,213,163,0.3); width:26px; height:26px; border-radius:var(--full); display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }

    /* ---------- Stat cards ---------- */
    .stat { background:var(--glass); border:1px solid var(--line); border-radius:var(--radius); padding:20px 20px 18px; transition:border-color .2s var(--ease); }
    .stat:hover { border-color:var(--line-h); }
    .stat .val { font-size:30px; font-weight:600; letter-spacing:-.03em; line-height:1; }
    .stat.accent .val { color:var(--accent); }
    .stat .lbl { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--text2); margin-top:12px; }
    .stat .sub { font-size:11.5px; color:var(--muted); margin-top:6px; }

    /* ---------- Chips ---------- */
    .chip { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:500; letter-spacing:.02em; padding:4px 11px; border-radius:var(--full); border:1px solid var(--line); color:var(--text2); white-space:nowrap; }
    .chip.t-accent { color:var(--accent); border-color:rgba(232,213,163,0.3); background:rgba(232,213,163,0.08); }
    .chip.t-success { color:var(--success); border-color:rgba(74,222,128,0.3); background:rgba(74,222,128,0.08); }
    .chip.t-warn { color:var(--accent-dim); border-color:rgba(201,169,110,0.34); background:rgba(201,169,110,0.10); }
    .chip.t-error { color:var(--error); border-color:rgba(248,113,113,0.3); background:rgba(248,113,113,0.08); }
    .chip.t-muted { color:var(--muted); border-color:var(--line-soft); }
    .chips { display:flex; flex-wrap:wrap; gap:8px; }
    .mono { font-family:ui-monospace,'SF Mono',Menlo,monospace; font-size:12px; color:var(--accent-dim); }

    /* ---------- KV rows ---------- */
    .kv { display:flex; gap:16px; padding:13px 0; border-bottom:1px solid var(--line-soft); }
    .kv:last-child { border-bottom:0; }
    .kv .k { flex:0 0 168px; font-size:12px; letter-spacing:.04em; color:var(--accent-dim); font-weight:500; text-transform:uppercase; padding-top:1px; }
    .kv .v { flex:1; color:var(--text2); font-size:13.5px; }

    /* ---------- Table ---------- */
    table { width:100%; border-collapse:collapse; }
    th { text-align:left; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:500; padding:0 14px 12px; border-bottom:1px solid var(--line); }
    td { padding:14px 14px; border-bottom:1px solid var(--line-soft); font-size:13px; color:var(--text2); vertical-align:top; }
    tr:last-child td { border-bottom:0; }
    td.lead-cell { color:var(--text); font-weight:500; }
    .table-wrap { background:var(--glass); border:1px solid var(--line); border-radius:var(--radius); padding:8px 10px; overflow-x:auto; }

    /* ---------- Lists ---------- */
    ul.bullets { list-style:none; }
    ul.bullets li { position:relative; padding:9px 0 9px 22px; color:var(--text2); font-size:13.5px; border-bottom:1px solid var(--line-soft); }
    ul.bullets li:last-child { border-bottom:0; }
    ul.bullets li::before { content:''; position:absolute; left:4px; top:16px; width:5px; height:5px; border-radius:var(--full); background:var(--accent-dim); }

    .callout { border-radius:var(--radius); padding:20px 22px; border:1px solid rgba(232,213,163,0.24); background:rgba(232,213,163,0.05); }
    .callout .tag { font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); font-weight:600; margin-bottom:9px; }
    .callout p { color:var(--text); font-size:14px; line-height:1.6; }
    .callout.warn { border-color:rgba(201,169,110,0.3); background:rgba(201,169,110,0.06); }
    .callout.warn .tag { color:var(--accent-dim); }

    /* ---------- Quote / verbatim ---------- */
    .quote { font-size:17px; line-height:1.5; color:var(--text); font-weight:400; padding:14px 0 14px 18px; border-left:2px solid var(--accent); }
    .quote .src { display:block; font-size:11px; color:var(--muted); margin-top:8px; letter-spacing:.06em; text-transform:uppercase; }

    /* ---------- Voice card ---------- */
    .voicecard { background:linear-gradient(180deg, rgba(232,213,163,0.07), rgba(232,213,163,0.02)); border:1px solid rgba(232,213,163,0.28); border-radius:var(--radius); padding:24px; }
    .voicecard .head { display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
    .voicecard .head .t { font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--accent); font-weight:600; }
    .voicecard pre { white-space:pre-wrap; font-family:ui-monospace,'SF Mono',Menlo,monospace; font-size:12.5px; line-height:1.7; color:var(--text); background:rgba(0,0,0,0.32); border:1px solid var(--line); border-radius:var(--radius-lg); padding:18px; }
    .btn { display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:500; letter-spacing:.02em; color:var(--accent); background:transparent; border:1px solid rgba(232,213,163,0.34); padding:8px 16px; border-radius:var(--full); cursor:pointer; transition:background .2s var(--ease), border-color .2s var(--ease); }
    .btn:hover { background:rgba(232,213,163,0.1); border-color:var(--accent); }
    .btn svg { width:14px; height:14px; }

    .dodont { display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
    .dodont .h { font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; padding:12px 18px; font-weight:600; border-bottom:1px solid var(--line); }
    .dodont .h.do { color:var(--success); } .dodont .h.dont { color:var(--error); border-left:1px solid var(--line); }
    .dodont .cell { padding:13px 18px; font-size:13px; color:var(--text2); border-bottom:1px solid var(--line-soft); }
    .dodont .cell.dont { border-left:1px solid var(--line); color:var(--muted); }
    .dodont .cell:nth-last-child(-n+2){ border-bottom:0; }

    .linkout { display:inline-flex; align-items:center; gap:6px; color:var(--accent-dim); font-size:12px; margin-top:14px; }
    .linkout:hover { color:var(--accent); }
    .linkout svg { width:13px; height:13px; }

    .freshness { display:flex; align-items:center; gap:10px; font-size:12px; color:var(--muted); margin-bottom:24px; flex-wrap:wrap; }
    .freshness .pill { display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line-soft); border-radius:var(--full); padding:5px 12px; }

    .small { font-size:12px; color:var(--muted); }
    .mt0 { margin-top:0; }

    /* ---------- Battle Card ---------- */
    .bc { border:1px solid var(--line); border-radius:var(--radius); background:var(--glass); padding:24px; }
    .bc:hover { border-color:var(--line-h); }
    .bc .bc-head { display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
    .bc .bc-head h3 { font-size:18px; font-weight:600; letter-spacing:-.01em; margin:0; }
    .bc .bc-site { font-family:ui-monospace,'SF Mono',Menlo,monospace; font-size:11.5px; color:var(--accent-dim); }
    .bc .bc-site:hover { color:var(--accent); }
    .bc .bc-tag { font-size:14.5px; color:var(--text); line-height:1.45; padding:0 0 0 16px; border-left:2px solid var(--accent-dim); margin-bottom:16px; }
    .bc .sw { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:16px 0; }
    .bc .sw h5 { font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; font-weight:600; margin-bottom:9px; }
    .bc .sw .edge h5 { color:var(--success); }
    .bc .sw .soft h5 { color:var(--error); }
    .bc .sw ul { list-style:none; }
    .bc .sw li { position:relative; padding:6px 0 6px 16px; font-size:13px; color:var(--text2); line-height:1.45; }
    .bc .sw li::before { content:''; position:absolute; left:2px; top:13px; width:5px; height:5px; border-radius:var(--full); }
    .bc .sw .edge li::before { background:var(--success); opacity:.7; }
    .bc .sw .soft li::before { background:var(--error); opacity:.6; }
    .bc .objection { border:1px solid rgba(201,169,110,0.3); background:rgba(201,169,110,0.06); border-radius:var(--radius-lg); padding:13px 16px; margin:14px 0; }
    .bc .objection .t { font-size:10px; letter-spacing:.13em; text-transform:uppercase; color:var(--accent-dim); font-weight:600; margin-bottom:5px; }
    .bc .objection p { color:var(--text); font-size:13.5px; font-style:italic; }
    .bc .wins { border:1px solid rgba(232,213,163,0.28); background:rgba(232,213,163,0.05); border-radius:var(--radius-lg); padding:16px 18px; border-left:2px solid var(--accent); }
    .bc .wins .t { font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--accent); font-weight:600; margin-bottom:12px; }
    .bc .wins .win { display:flex; gap:12px; align-items:flex-start; padding:7px 0; }
    .bc .wins .win:not(:last-child) { border-bottom:1px solid var(--line-soft); }
    .bc .wins .win p { color:var(--text); font-size:13.5px; line-height:1.5; margin:0; }
    .bc-meta { display:flex; gap:18px; flex-wrap:wrap; font-size:12px; color:var(--muted); margin-bottom:14px; }
    .bc-meta b { color:var(--text2); font-weight:500; }

    /* matrix */
    .bc-matrix { min-width:1180px; }
    .bc-matrix th.us, .bc-matrix td.us { background:rgba(232,213,163,0.07); }
    .bc-matrix th.us { color:var(--accent); }
    .bc-matrix th .site { display:block; font-size:9px; color:var(--muted); text-transform:none; letter-spacing:0; margin-top:3px; font-weight:400; }
    .bc-matrix td { font-size:12px; }
    .bc-matrix tr.grouprow td { background:var(--bg2); color:var(--accent-dim); font-size:10px; letter-spacing:.13em; text-transform:uppercase; font-weight:600; padding:9px 14px; }
    .bc-matrix .ver { color:var(--muted); }
    @media (max-width:900px){ .bc .sw { grid-template-columns:1fr; } }

    /* ---------- Funnel ---------- */
    .win-sel { display:flex; gap:6px; flex-wrap:wrap; margin:-6px 0 22px; }
    .win-sel button { font-family:var(--sans); font-size:12px; padding:6px 14px; border-radius:var(--full); border:1px solid var(--line); background:transparent; color:var(--text2); cursor:pointer; transition:background .2s var(--ease), border-color .2s var(--ease), color .2s var(--ease); }
    .win-sel button:hover { border-color:var(--line-h); color:var(--text); }
    .win-sel button.on { background:rgba(232,213,163,0.12); border-color:rgba(232,213,163,0.4); color:var(--accent); }
    .fbar { display:grid; grid-template-columns:198px 1fr 132px; gap:14px; align-items:center; padding:6px 0; }
    .fbar .lab { font-size:13px; color:var(--text); font-weight:500; line-height:1.25; }
    .fbar .lab .ev { display:block; font-family:ui-monospace,Menlo,monospace; font-size:10px; color:var(--muted); margin-top:2px; }
    .fbar .track { height:30px; background:var(--glass); border:1px solid var(--line-soft); border-radius:var(--radius-sm); overflow:hidden; }
    .fbar .fill { height:100%; background:linear-gradient(90deg, rgba(232,213,163,0.42), rgba(232,213,163,0.16)); min-width:3px; transition:width .5s var(--ease); }
    .fbar.aha .fill { background:linear-gradient(90deg, var(--accent), var(--accent-dim)); }
    .fbar.pay .fill { background:linear-gradient(90deg, var(--success), rgba(74,222,128,0.35)); }
    .fbar .meta { text-align:right; }
    .fbar .meta .n { font-size:18px; font-weight:600; letter-spacing:-.02em; }
    .fbar .meta .step { font-size:11px; margin-top:2px; }
    .step-hi { color:var(--success); } .step-mid { color:var(--accent-dim); } .step-lo { color:var(--error); }
    .fgroup { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent-dim); font-weight:600; margin:20px 0 6px; }
    .badge-aha, .badge-pay { font-size:9px; letter-spacing:.08em; text-transform:uppercase; padding:2px 7px; border-radius:var(--full); margin-left:8px; font-weight:700; }
    .badge-aha { background:rgba(232,213,163,0.18); color:var(--accent); }
    .badge-pay { background:rgba(74,222,128,0.16); color:var(--success); }
    .spine .srow { display:grid; grid-template-columns:180px 1fr 88px; gap:14px; align-items:center; padding:7px 0; }
    .spine .srow .sl { font-size:13px; color:var(--text2); }
    .spine .srow.aha .sl, .spine .srow.pay .sl { color:var(--text); font-weight:500; }
    .spine .sbar { height:9px; border-radius:var(--full); background:var(--glass); overflow:hidden; border:1px solid var(--line-soft); }
    .spine .sbar i { display:block; height:100%; background:var(--accent-dim); border-radius:var(--full); transition:width .5s var(--ease); }
    .spine .srow.aha .sbar i { background:var(--accent); }
    .spine .srow.pay .sbar i { background:var(--success); }
    .spine .spct { text-align:right; font-size:13.5px; font-weight:600; }
    .spine .spct span { font-size:11px; color:var(--muted); font-weight:400; margin-left:5px; }

    /* ---------- Lifecycle ---------- */
    .tl { position:relative; padding-left:28px; margin-top:4px; }
    .tl::before { content:''; position:absolute; left:6px; top:8px; bottom:8px; width:2px; background:var(--line); }
    .tl .node { position:relative; margin-bottom:14px; }
    .tl .node:last-child { margin-bottom:0; }
    .tl .node::before { content:''; position:absolute; left:-28px; top:8px; width:12px; height:12px; border-radius:50%; background:var(--accent); border:2px solid var(--bg); }
    .tl .node.ghost::before { background:var(--muted); }
    .email { background:var(--glass); border:1px solid var(--line); border-radius:var(--radius-lg); padding:13px 16px; }
    .email.ghost { border-style:dashed; }
    .email .et { display:flex; justify-content:space-between; gap:10px; align-items:center; flex-wrap:wrap; }
    .email .et b { font-size:13.5px; font-weight:600; }
    .email .timing { font-size:11px; color:var(--accent-dim); }
    .email .estats { display:flex; gap:18px; margin-top:9px; font-size:11.5px; color:var(--muted); flex-wrap:wrap; }
    .email .estats b { color:var(--text); font-weight:600; }
    .prep-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .prep { border:1px dashed var(--line-h); border-radius:var(--radius-lg); padding:12px 14px; background:var(--glass); }
    .prep .pn { font-size:13px; color:var(--text); font-weight:500; }
    .prep .pm { font-size:11px; color:var(--accent-dim); margin-top:4px; }

    /* ---------- Command Center ---------- */
    .cmd { display:grid; grid-template-columns:36px 1fr; gap:15px; padding:17px 0; border-bottom:1px solid var(--line-soft); }
    .cmd:last-child { border-bottom:0; }
    .cmd .rk { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:13px; flex-shrink:0; }
    .cmd .rk.high { background:rgba(248,113,113,0.14); color:var(--error); }
    .cmd .rk.med { background:rgba(201,169,110,0.16); color:var(--accent-dim); }
    .cmd .rk.done { background:rgba(74,222,128,0.16); color:var(--success); }
    .cmd .rk.done svg { width:15px; height:15px; stroke-width:2.4; }
    .cmd.done { opacity:.55; }
    .cmd.done h3 { text-decoration:line-through; text-decoration-color:var(--muted); }
    .cmd h3 { font-size:14.5px; font-weight:600; margin:0 0 6px; }
    .cmd .cmeta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
    .srchealth { display:flex; gap:18px; flex-wrap:wrap; margin-bottom:26px; }
    .srchealth .s { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); }
    .srchealth .s .how { color:var(--muted); }
    /* objectives anchor + ladder */
    .objbar { border:1px solid rgba(232,213,163,0.24); background:rgba(232,213,163,0.05); border-radius:var(--radius); padding:16px 18px; margin-bottom:24px; }
    .objbar .ns { font-size:14px; color:var(--text2); margin-bottom:13px; }
    .objbar .ns b { color:var(--accent); }
    .objkpis { display:flex; gap:10px; flex-wrap:wrap; }
    .objkpi { border:1px solid var(--line); border-radius:var(--radius-sm); padding:8px 13px; }
    .objkpi .k { font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
    .objkpi .v { font-size:16px; font-weight:600; color:var(--text); margin-top:2px; }
    .objrule { font-size:12px; color:var(--muted); margin-top:13px; }
    .ladder { font-size:10.5px; color:var(--accent-dim); display:inline-flex; align-items:center; gap:5px; margin-top:9px; }
    .ladder svg { width:13px; height:13px; flex-shrink:0; stroke-width:1.8; }
    /* ClickUp feed */
    .cutask { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--line-soft); }
    .cutask:last-child { border-bottom:0; }
    .cudot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
    .cutask .nm { font-size:13px; color:var(--text2); flex:1; }
    .cutask a.nm:hover { color:var(--text); }
    .custatus { font-size:10px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
    /* content calendar */
    .callegend { display:flex; gap:15px; flex-wrap:wrap; margin:-4px 0 16px; font-size:11.5px; color:var(--text2); }
    .callegend span { display:inline-flex; align-items:center; gap:6px; }
    .cdotlg { width:9px; height:9px; border-radius:2px; }
    .cal { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
    .cal .dow { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); text-align:center; padding:2px 0 6px; }
    .cal .day { min-height:80px; border:1px solid var(--line-soft); border-radius:var(--radius-sm); padding:6px; background:var(--glass); }
    .cal .day.empty { background:transparent; border-color:transparent; }
    .cal .day.today { border-color:rgba(232,213,163,0.45); }
    .cal .dnum { font-size:11px; color:var(--muted); margin-bottom:4px; }
    .cal .day.today .dnum { color:var(--accent); font-weight:600; }
    .cevt { font-size:10px; line-height:1.25; padding:3px 5px; border-radius:4px; margin-bottom:3px; color:var(--text); border-left:2px solid var(--accent-dim); background:var(--glass-h); }
    @media (max-width:760px){ .cal .day { min-height:auto; } .cevt { font-size:0; padding:3px; } .cevt::before{ content:'•'; font-size:13px; } }

    /* ---------- Trends ---------- */
    .tcard { background:var(--glass); border:1px solid var(--line); border-radius:var(--radius); padding:17px 19px; }
    .tcard:hover { border-color:var(--line-h); }
    .tcard .th { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
    .tcard .tlab { font-size:10.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--text2); line-height:1.3; }
    .tcard .tval { font-size:25px; font-weight:600; letter-spacing:-.025em; margin-top:9px; }
    .tcard .tval small { font-size:12px; color:var(--muted); font-weight:400; margin-left:2px; }
    .tdelta { font-size:11px; font-weight:600; display:inline-flex; align-items:center; gap:2px; padding:3px 8px; border-radius:var(--full); white-space:nowrap; flex-shrink:0; }
    .tdelta.up { color:var(--success); background:rgba(74,222,128,0.12); }
    .tdelta.down { color:var(--error); background:rgba(248,113,113,0.12); }
    .tdelta.flat { color:var(--muted); background:var(--glass-h); }
    .tspark { margin-top:13px; height:34px; }
    .tspark svg { width:100%; height:34px; display:block; }
    .tsub { font-size:10.5px; color:var(--muted); margin-top:9px; }
    @media (max-width:900px){ .fbar { grid-template-columns:120px 1fr 74px; } .fbar .lab .ev { display:none; } .spine .srow { grid-template-columns:120px 1fr 64px; } .prep-grid { grid-template-columns:1fr; } }

    /* ---------- Responsive ---------- */
    @media (max-width:900px) {
      :root { --sidebar:0px; }
      #sidebar { transform:translateX(-100%); width:280px; }
      #sidebar.open { transform:none; box-shadow:0 25px 50px -12px rgba(0,0,0,0.6); }
      #main { margin-left:0; }
      .hamb { display:inline-flex; }
      .topbar { padding:12px 18px; }
      .view { padding:30px 20px 80px; }
      .view h1 { font-size:27px; }
      .g2,.g3,.g4 { grid-template-columns:1fr; }
      .kv { flex-direction:column; gap:4px; } .kv .k { flex:none; }
      .dodont { grid-template-columns:1fr; } .dodont .h.dont,.dodont .cell.dont { border-left:0; }
      .scrim.show { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:45; }
    }
    @media (min-width:901px){ .scrim{ display:none; } }
  </style>
</head>
<body>
  <aside id="sidebar">
    <div class="brand">
      <img src="assets/ablo-logo.png" alt="Ablo" />
      <div class="wm"><b>ABLO STUDIO</b><span>Marketing OS</span></div>
    </div>
    <nav id="nav"></nav>
    <div class="side-foot" id="foot"></div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <main id="main">
    <div class="topbar">
      <button class="hamb" id="hamb" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="crumb" id="crumb">Marketing OS</div>
      <div class="conf"><span class="dot" style="background:var(--accent-dim)"></span> Internal · Confidential</div>
    </div>
    <div class="view" id="view"></div>
  </main>

  <script src="data.js"></script>
  <script>
  (function(){
    const D = window.ABLO_OS || {};
    const L = D.live || {};
    let funnelWin = 'all';  // funnel time-window selector state

    // ---- tiny DOM helper ----
    function h(tag, attrs, ...kids){
      const e=document.createElement(tag);
      if(attrs) for(const k in attrs){
        if(k==='class') e.className=attrs[k];
        else if(k==='html') e.innerHTML=attrs[k];
        else if(k.startsWith('on')&&typeof attrs[k]==='function') e.addEventListener(k.slice(2),attrs[k]);
        else if(attrs[k]!=null) e.setAttribute(k,attrs[k]);
      }
      for(let kid of kids.flat()){ if(kid==null||kid===false)continue; e.append(kid.nodeType?kid:document.createTextNode(kid)); }
      return e;
    }
    const frag=(...k)=>{const f=document.createDocumentFragment(); k.flat().forEach(x=>{if(x)f.append(x);}); return f;};

    // ---- icons (lucide-style) ----
    const I = {
      home:'M3 11l9-8 9 8M5 10v10h14V10',
      target:'M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0-18 0M12 12m-5 0a5 5 0 1 0 10 0a5 5 0 1 0-10 0M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0-2 0',
      users:'M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8a4 4 0 0 0 0 8M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75',
      compass:'M12 12m-10 0a10 10 0 1 0 20 0a10 10 0 1 0-20 0M16.24 7.76l-2.12 6.36l-6.36 2.12l2.12-6.36z',
      swords:'M14.5 17.5L3 6V3h3l11.5 11.5M13 19l6-6M16 16l4 4M19 21l2-2M5 14l-2 2v3h3l2-2',
      message:'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z',
      feather:'M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5zM16 8L2 22M17.5 15H9',
      flask:'M9 3h6M10 3v6.5L5 18a2 2 0 0 0 2 3h10a2 2 0 0 0 2-3l-5-8.5V3M7.5 14h9',
      megaphone:'M3 11l14-7v16l-14-7zM3 11v4M7 12.5V20a1 1 0 0 0 1 1h2',
      layout:'M3 3h18v18H3zM3 9h18M9 21V9',
      shield:'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z',
      funnel:'M3 4h18l-7 9v6l-4 2v-8z',
      mail:'M4 5h16v14H4zM4 7l8 6 8-6',
      layers:'M12 2l9 5-9 5-9-5zM3 12l9 5 9-5M3 17l9 5 9-5',
      zap:'M13 2L4 14h7l-1 8 10-12h-7z',
      trend:'M22 7l-8.5 8.5-4-4L2 19M16 7h6v6',
      calendar:'M3 5h18v16H3zM3 9h18M8 3v4M16 3v4',
      bot:'M12 2v3M5 8h14a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1zM9 13v1M15 13v1M2 12v3M22 12v3',
      map:'M9 3L3 6v15l6-3 6 3 6-3V3l-6 3zM9 3v15M15 6v15',
    };
    const svg = p => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">${p.split('M').filter(Boolean).map(d=>'<path d="M'+d+'"/>').join('')}</svg>`;

    // ---- reusable blocks ----
    const blocktitle = t => h('div',{class:'blocktitle'},t);
    const chip = (t,tone) => h('span',{class:'chip t-'+(tone||'default')},t);
    function card(opts){
      const c=h('div',{class:'card'+(opts.cls?' '+opts.cls:'')});
      if(opts.icon) c.append(h('div',{class:'ico',html:svg(opts.icon)}));
      if(opts.badge) c.append(h('div',{style:'margin-bottom:12px'},h('span',{class:'num-badge'},opts.badge)));
      if(opts.eyebrow) c.append(h('div',{class:'eyebrow',style:'margin-bottom:8px'},opts.eyebrow));
      if(opts.title){ const t=h('h3',{},opts.title); if(opts.chip){t.style.display='flex';t.style.justifyContent='space-between';t.style.alignItems='center';t.style.gap='10px';t.append(chip(opts.chip.t,opts.chip.tone));} c.append(t); }
      if(opts.body) c.append(h('p',{html:opts.body}));
      (opts.children||[]).forEach(x=>x&&c.append(x));
      return c;
    }
    const stat = k => { const s=h('div',{class:'stat'+(k.tone==='accent'?' accent':'')}); s.append(h('div',{class:'val'},k.value),h('div',{class:'lbl'},k.label)); if(k.sub)s.append(h('div',{class:'sub'},k.sub)); return s; };
    function kvList(arr){ const w=h('div',{class:'card flat'}); arr.forEach(r=>w.append(h('div',{class:'kv'},h('div',{class:'k'},r.k),h('div',{class:'v',html:r.v})))); return w; }
    function bullets(arr){ const u=h('ul',{class:'bullets'}); arr.forEach(x=>u.append(h('li',{html:x}))); return u; }
    function table(headers,rows){ const w=h('div',{class:'table-wrap'}); const t=h('table'); const tr=h('tr'); headers.forEach(x=>tr.append(h('th',{},x))); t.append(h('thead',{},tr)); const tb=h('tbody'); rows.forEach(r=>{const x=h('tr'); r.forEach((c,i)=>{ if(c&&c.chip){x.append(h('td',{},chip(c.chip,c.tone)));} else {x.append(h('td',{class:(i===0?'lead-cell':''),html:(c&&c.html!=null?c.html:c)}));}}); tb.append(x);}); t.append(tb); w.append(t); return w; }
    const sectionHead=(eyebrow,title,lede)=>h('div',{class:'sec-head'},h('div',{class:'eyebrow'},eyebrow),h('h1',{},title),lede?h('p',{class:'lede'},lede):null);

    // ============================ SECTIONS ============================
    const S = {};

    S.overview = ()=>{ const o=D.overview||{}; const m=D.meta||{};
      return frag(
        sectionHead('North Star', m.northStar||'Ablo Studio · Marketing OS',
          o.elevator),
        h('div',{class:'grid g3',style:'margin-top:8px'}, (L.kpis||[]).map(stat)),
        blocktitle('How it works'),
        h('div',{class:'grid g3'}, (o.howItWorks||[]).map(s=>card({badge:s.step,title:s.title,body:s.body}))),
        blocktitle('Current focus'),
        card({cls:'flat',children:[bullets(o.currentFocus||[])]}),
        blocktitle('Strategic posture'),
        h('div',{class:'grid g3'}, (o.posture||[]).map(p=>card({title:p.k,body:p.v}))),
        blocktitle('Quick facts'),
        kvList([
          {k:'Product',v:m.product+' · '+(m.tagline?('“'+m.tagline+'”'):'')},
          {k:'Website',v:'<a class="linkout" style="margin:0" href="'+(m.url||'#')+'" target="_blank" rel="noopener">'+(m.url||'')+' ↗</a>'},
          {k:'Stage',v:m.stage||''},
          {k:'End-of-June goal',v:m.endOfJuneGoal||''},
          {k:'Marketing owner',v:m.ownerMarketing||''},
          {k:'Source of truth',v:m.sourceNote||''},
        ])
      );
    };

    S.goals = ()=>{ const g=D.goals||{};
      return frag(
        sectionHead('Goals & OKRs','What winning looks like','North-star, the brag, the levers, and the unit economics behind the validation push.'),
        h('div',{class:'grid g2'},
          card({cls:'accent',eyebrow:'North Star',title:'',body:g.northStar}),
          card({cls:'accent lead',eyebrow:'The brag',title:'',body:g.theBrag})
        ),
        g.okrs? blocktitle('OKRs by quarter') : null,
        g.okrs? h('div',{class:'stack'}, (g.okrs||[]).map(q=>card({children:[
          h('div',{style:'display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px'},
            h('h3',{style:'margin:0'}, q.quarter+'  ', h('span',{class:'small',style:'color:var(--muted);font-weight:400'}, q.window)),
            chip(q.theme,'accent')),
          h('p',{style:'margin:0 0 12px'}, h('b',{style:'color:var(--text)'},'Objective. '), q.objective),
          h('div',{class:'card flat',style:'padding:2px 16px'}, (q.krs||[]).map(k=>h('div',{class:'kv'},
            h('div',{class:'k',style:'flex:0 0 52%;text-transform:none;color:var(--text2);letter-spacing:0'}, k.kr),
            h('div',{class:'v',style:'display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap'},
              h('span',{class:'small'}, k.current+' → ', h('span',{style:'color:var(--accent)'},k.target)),
              chip(k.status, k.status==='on-track'?'success':k.status==='at-risk'?'warn':k.status==='done'?'accent':'muted')))))
        ]}))) : null,
        blocktitle('KPO goals'),
        h('div',{class:'stack'}, (g.kpoGoals||[]).map(k=>card({cls:'flat',children:[
          h('div',{style:'display:flex;gap:14px;align-items:flex-start'}, chip(k.type,k.tone), h('p',{style:'margin:1px 0 0'},k.text))
        ]}))),
        blocktitle('Revenue levers (stack-ranked)'),
        h('div',{class:'stack'}, (g.revenueLevers||[]).map(l=>card({children:[
          h('div',{style:'display:flex;gap:14px;align-items:center;margin-bottom:8px'}, h('span',{class:'num-badge'},l.rank), h('h3',{style:'margin:0;flex:1'},l.name), chip(l.role, l.rank==='1'?'accent':l.rank==='2'?'accent':'muted')),
          h('p',{},l.body)
        ]}))),
        blocktitle('Funnel targets'),
        table(['Stage','Definition','Current','Target'], (g.funnel||[]).map(f=>[f.stage,f.def,f.current,{html:'<span style="color:var(--accent)">'+f.target+'</span>'}])),
        blocktitle('Unit economics'),
        h('div',{class:'grid g4'}, (g.unitEconomics||[]).map(u=>stat({value:u.v,label:u.k,sub:u.sub,tone:'accent'}))),
        blocktitle('The 90-day arc'),
        card({cls:'flat',body:g.arc})
      );
    };

    S.icp = ()=>{ const c=D.icp||{};
      return frag(
        sectionHead('ICP & Segments','Who we sell to',c.wedgeNote),
        card({cls:'accent',eyebrow:'The buyer (firmographic ICP)',body:c.buyer}),
        h('div',{class:'callout',style:'margin-top:16px'}, h('div',{class:'tag'},'Geography'), h('p',{},c.geo)),
        blocktitle('Segments by maturity'),
        h('div',{class:'stack'}, (c.tiers||[]).map(t=>card({cls:t.tone==='accent'?'lead':'',children:[
          h('div',{style:'display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px'},
            h('h3',{style:'margin:0'},t.name),
            h('div',{class:'chips'}, chip(t.maturity,t.tone), chip(t.share,'muted'))),
          h('p',{class:'small',style:'margin:0 0 8px;color:var(--accent-dim)'},t.company),
          h('p',{},t.why)
        ]}))),
        blocktitle('The lesson behind the wedge'),
        h('div',{class:'callout warn'}, h('div',{class:'tag'},'Wedge on the model, not the background'), h('p',{},c.lesson)),
        blocktitle('Scoring rubric'),
        h('div',{class:'grid g3'}, (c.rubric||[]).map(r=>card({badge:r.n,title:r.name,body:r.body}))),
        blocktitle('The decisive test'),
        card({cls:'flat',body:c.decisiveTest}),
        blocktitle('Who actually showed up'),
        card({cls:'flat',body:c.realSignups})
      );
    };

    S.positioning = ()=>{ const p=D.positioning||{}; const pr=D.pricing||{};
      return frag(
        sectionHead('Positioning','How we frame the choice',null),
        card({cls:'accent',children:[
          h('div',{style:'display:flex;align-items:center;gap:12px;margin-bottom:10px'}, chip('Product type: '+(p.type||''),'accent')),
          h('p',{style:'color:var(--text);font-size:15px;line-height:1.6'},p.statement)
        ]}),
        h('div',{class:'callout',style:'margin-top:16px'}, h('div',{class:'tag'},'The differentiator'), h('p',{},p.differentiator)),
        blocktitle('Today vs in ~1 year'),
        table(['','Today','In ~1 year'], (p.quad||[]).map(q=>[{html:'<b style="color:var(--text)">'+q.q+'</b>'},q.today,q.year])),
        blocktitle('Proof'),
        h('div',{class:'grid g2'},
          card({title:'Proof we can use today',children:[bullets(p.proofToday||[])]}),
          card({title:'Proof to earn',children:[bullets(p.proofToEarn||[])]})
        ),
        h('div',{class:'callout warn',style:'margin-top:16px'}, h('div',{class:'tag'},'Caveat · parent credibility'), h('p',{},p.parentCredibility)),
        blocktitle('Pricing (verify before using in copy)'),
        h('div',{class:'callout warn'}, h('div',{class:'tag'},'Verify live'), h('p',{},pr.note)),
        kvList((pr.rows||[]).map(r=>({k:r.k,v:r.v})))
      );
    };

    S.competition = ()=>{ const c=D.competition||{};
      return frag(
        sectionHead('Competition','The set, and how we frame each',c.intro),
        h('div',{class:'stack'}, (c.set||[]).map(x=>card({cls:x.tone==='accent'?'lead':'',children:[
          h('h3',{style:'margin-bottom:12px'},x.name),
          h('div',{class:'kv'},h('div',{class:'k'},'What it is'),h('div',{class:'v'},x.what)),
          h('div',{class:'kv'},h('div',{class:'k'},'Our pitch'),h('div',{class:'v',style:'color:var(--text)'},x.pitch)),
          h('div',{class:'kv'},h('div',{class:'k'},'Where they win'),h('div',{class:'v'},x.win))
        ]}))),
        blocktitle('Differentiation summary'),
        card({cls:'flat',children:[bullets(c.differentiation||[])]})
      );
    };

    S.battlecard = ()=>{ const b=D.battlecard||{}; const comps=b.competitors||[];
      // render a matrix value cell: mute empties and VERIFY flags
      const fmtCell = t => {
        if(t==null||t==='') return '<span class="ver">·</span>';
        const s=String(t).trim();

      function matrix(cols, groups){

    S.funnel = ()=>{ const f=(L.funnel)||D.funnelCurated||{}; const live=(L.refreshedSources||{}).funnel;

    S.lifecycle = ()=>{ const lc=(L.lifecycle)||D.lifecycleCurated||{}; const live=(L.refreshedSources||{}).klaviyo;

    S.channels = ()=>{ const c=D.channels||{}; const att=(L.channels)||null; const attLive=(L.refreshedSources||{}).channels;

      // sparkline from a numeric array (nulls dropped); accent stroke, last-point dot
      function spark(vals){
        const v=vals.filter(x=>typeof x==='number');
        if(!v.length) return '';
        const mn=Math.min(...v), mx=Math.max(...v), rng=(mx-mn)||1, n=v.length;
        const xy=v.map((x,i)=>[(n===1?50:(i/(n-1))*100), 31-((x-mn)/rng)*28]);
        const pts=xy.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
        const lp=xy[xy.length-1];
        return '<svg viewBox="0 0 100 34" preserveAspectRatio="none">'
          + (n>1?'<polyline fill="none" stroke="var(--accent-dim)" stroke-width="1.5" vector-effect="non-scaling-stroke" points="'+pts+'"/>':'')
          + '<circle cx="'+lp[0].toFixed(1)+'" cy="'+lp[1].toFixed(1)+'" r="2.4" fill="var(--accent)" vector-effect="non-scaling-stroke"/></svg>';
      }

        if(prev==null||cur==null||prev===0) return h('span',{class:'tdelta flat'},'new');

        if(pct===0) return h('span',{class:'tdelta flat'},'0%');
        const better = good==='neutral'? null : (good==='down' ? pct<0 : pct>0);
        const cls = better==null?'flat':(better?'up':'down');
        return h('span',{class:'tdelta '+cls}, (pct>0?'▲ +':'▼ ')+pct+'%');

          h('div',{class:'tval'}, String(cur)),

          h('div',{class:'tsub'},'last 7 days · vs '+prev+' prior 7d'));

      function rateCard(c){

        const cur=r7(L7), prev=r7(P7);
        const series=rows.map((_,i)=>{ const w=rows.slice(Math.max(0,i-6),i+1); const d=sum(w,c.den); return d? sum(w,c.num)/d*100:null; });
        return h('div',{class:'tcard'},
          h('div',{class:'th'}, h('div',{class:'tlab'}, c.label), deltaChip(cur,prev,'up')),

      function snapCard(c){

          h('div',{class:'tspark',html:spark(series)}),
          h('div',{class:'tsub'}, nonNull.length<=1?'accumulating daily':'since '+(rows.find(r=>typeof r[c.k]==='number')||{}).date));
      }

      const VOL=[{k:'signups',label:'New signups',aha:false},{k:'tryons',label:'Try-ons',aha:true},{k:'checkouts',label:'Checkouts',pay:true},{k:'landed',label:'Visitors'},{k:'models',label:'Models generated'},{k:'modal',label:'Signup-modal opens'}];
      const RATE=[{num:'tryons',den:'signups',label:'Aha rate (signup→try-on)'},{num:'models',den:'signups',label:'Activation (signup→model)'},{num:'checkouts',den:'signups',label:'Payment rate (signup→checkout)'}];
      const SNAP=[{k:'cpl',label:'Cost per signup',good:'down',fmt:'$'},{k:'spend_lifetime',label:'Lifetime spend',good:'neutral',fmt:'$'},{k:'email_open',label:'Email open rate',good:'up',fmt:'%'}];

      // biggest movers (volume + rate, by |week-over-week %|, needs prior data)

      VOL.forEach(c=>{ const cur=sum(L7,c.k),prev=sum(P7,c.k); if(prev>0){ movers.push({label:c.label.toLowerCase(),pct:Math.round((cur-prev)/prev*100)}); }});

        h('p',{class:'small',style:'margin-top:20px'},'History is appended to history.jsonl on every build and committed, so the record survives and the daily routine can read it to judge whether each change is working.')

      if(!S[id]) id='overview';
      view.innerHTML='';
      const node=S[id]();
      // stagger child blocks
      const wrap=h('div',{}); wrap.append(node);
      [...wrap.children].forEach((c,i)=>{ c.classList.add('reveal'); c.style.animationDelay=(i*55)+'ms'; });
      view.append(wrap);
      crumb.textContent=LABELS[id]||'Marketing OS';
      document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.id===id));
      document.title='Ablo Studio · '+(LABELS[id]||'Marketing OS');
      window.scrollTo(0,0);
      closeNav();
    }
    function current(){ return (location.hash||'#overview').slice(1); }
    window.addEventListener('hashchange',()=>render(current()));

    // mobile nav
    const sb=document.getElementById('sidebar'), scrim=document.getElementById('scrim');
    function openNav(){ sb.classList.add('open'); scrim.classList.add('show'); }
    function closeNav(){ sb.classList.remove('open'); scrim.classList.remove('show'); }
    document.getElementById('hamb').addEventListener('click',openNav);
    scrim.addEventListener('click',closeNav);

    render(current());
  })();
  </script>
</body>
</html>
